name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build arm64 (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64 (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Strip and stage binaries
        run: |
          mkdir -p dist

          # Strip debug symbols for smaller binaries
          strip target/aarch64-apple-darwin/release/memo
          strip target/x86_64-apple-darwin/release/memo

          # Per-architecture binaries (no universal — two standalone slices)
          cp target/aarch64-apple-darwin/release/memo dist/memo-macos-arm64
          cp target/x86_64-apple-darwin/release/memo   dist/memo-macos-x86_64

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
